# DB Digital Agency — Apache (local + production)
# Installation : sudo ./scripts/setup-apache.sh
#
# Local  : http://localhost/dbdigitalagency/public/fr/…
#          http://localhost/dbdigitalagency/fr/… (DocumentRoot racine projet)
# Prod   : https://example.com/fr/… (DocumentRoot = racine ou public/)

# ── Front controller public/ (accès local …/public/…) ──
<Directory /var/www/html/dbdigitalagency/public>
    Options FollowSymLinks
    AllowOverride All
    Require all granted
    FallbackResource index.php
</Directory>

# ── Racine du dépôt (prod DocumentRoot = racine projet) ──
<Directory /var/www/html/dbdigitalagency>
    Options FollowSymLinks
    AllowOverride All
    Require all granted
    FallbackResource public/index.php
</Directory>
